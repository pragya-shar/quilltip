name: Feature Request
description: Suggest an improvement or new feature
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What problem does this solve? What's frustrating today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should this work? Be specific.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What other approaches did you think about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor / Writing
        - Reading / Articles
        - Tipping (Stellar)
        - Arweave Storage
        - Authentication
        - UI / Styling
        - Other
    validations:
      required: true
