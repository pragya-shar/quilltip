name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          allowed_tools: 'Bash(bun run lint),Bash(bun run typecheck),Bash(bun run test:once),Bash(bun run format:check)'
          direct_prompt: |
            Review this pull request. Read CLAUDE.md for project conventions and anti-slop rules.

            Run the following checks and report results:
            1. bun run lint
            2. bun run typecheck
            3. bun run format:check

            Then review the diff for:
            - Correctness and edge cases
            - Type safety (no `any`, proper Zod schemas at boundaries)
            - Security issues (XSS, injection, secrets in code)
            - Performance (unnecessary re-renders, inefficient queries)
            - Style compliance with CLAUDE.md rules
            - Conventional commit messages

            Be direct. Flag real issues, skip praise.
